# model list for fusion, the sequence must be the same during training and testing
model_list:
  - adaface
  - biggait
  - cal-ccvid

  # - agrl
  # - cal-mevid

  # - aim
  # - cal-ltcc
  
  # - arcface



# Checkpoint path

# Qwen2.5-VL
qwen_model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
qwen_cache_path: "/research/cvl-zhujie4/FusionAgent_CVPR26/checkpoints/"

# pretrained models from Huggingface
HF_TOKEN: 'YOUR_HUGGINGFACE_TOKEN'
# absolute path for pretrained models
kprpe_cache_path: /research/cvl-zhujie4/FusionAgent_CVPR26/src/fusionagent/checkpoints/kprpe
kprpe_aligner_path: /research/cvl-zhujie4/FusionAgent_CVPR26/src/fusionagent/checkpoints/kprpe/aligner
adaface_cache_path: /research/cvl-zhujie4/FusionAgent_CVPR26/src/fusionagent/checkpoints/adaface
arcface_cache_path: /research/cvl-zhujie4/FusionAgent_CVPR26/src/fusionagent/checkpoints/arcface

# BigGait
# DINOv2-s
biggait_backbone_path: /research/cvl-zhujie4/FusionAgent_CVPR26/src/fusionagent/checkpoints/BigGait/BigGait__Dinov2_Gaitbase_Frame30-40000.pt
biggait_cfg_path: /research/cvl-zhujie4/FusionAgent_CVPR26/src/fusionagent/WBModules/Biggait/configs/BigGait.yaml

#CAL
# for CCVID & LTCC(trained by GEFF) img size 384x192
cal-ccvid_backbone_path: ./src/fusionagent/checkpoints/CAL/ltcc-checkpoint.pth.tar  
cal-ccvid_config_path: ./src/fusionagent/WBModules/CAL/configs/res50_cels_cal.yaml

# for MEVID (trained by MEVID) img size 256x128
cal-mevid_backbone_path: ./src/fusionagent/checkpoints/CAL/CAL_best_model.pth.tar
cal-mevid_config_path: ./src/fusionagent/WBModules/CAL/configs/c2dres50_ce_cal.yaml

# for LTCC (trained by GEFF) img size
cal-ltcc_backbone_path: ./src/fusionagent/checkpoints/CAL/ltcc-checkpoint.pth.tar
cal-ltcc_config_path: ./src/fusionagent/WBModules/CAL/configs/res50_cels_cal.yaml


#AIM
# for LTCC (trained by GEFF) img size 384x192
aim_backbone_path: ./src/fusionagent/checkpoints/AIM/ltcc-checkpoint.pth.tar
aim_config_path: ./src/fusionagent/WBModules/AIM_CCReID/configs/res50_cels_cal.yaml


# AGRL
agrl_backbone_path: ./src/fusionagent/checkpoints/AGRL/AGRL_best_model.pth.tar